aid: unionai
name: Union.ai
review:
  question: Does Union.ai expose a documented public WebSocket or realtime streaming API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. The Union / Flyte control plane is a
    request/response API served over gRPC with an auto-generated HTTP/JSON
    gateway. There is no documented WebSocket surface, and no HTTP
    Server-Sent Events (SSE) streaming endpoint in the FlyteAdmin API, so
    nothing falls within the AsyncAPI (SSE-inclusive) scope.
findings:
  summary: |
    Union.ai is the commercial platform built on the open-source Flyte project
    (Apache-2.0). Its programmatic surface is the Flyte/Union control plane -
    the FlyteIDL AdminService (FlyteAdmin) - which is primarily a gRPC API.
    FlyteAdmin also exposes an HTTP/JSON REST gateway, generated automatically
    with grpc-gateway, where every gRPC method maps to an HTTP endpoint under
    /api/v1/. This REST gateway covers Projects, Domains, Tasks, Workflows,
    Launch Plans, Executions, Node Executions, Task Executions, attributes,
    named/description entities, and Version. The documented and recommended
    clients are the union / pyflyte CLI and the Flytekit / Union Python SDKs,
    which speak gRPC to the control plane; the REST gateway is real but is not
    maintained by the vendor as a hand-authored OpenAPI contract. There is no
    documented public WebSocket or realtime/bidirectional streaming API.
    Pricing is usage-based (actions + per-second CPU/Memory/GPU) on Serverless/
    Team, with sales-led, custom Enterprise/BYOC deals; the OSS Flyte engine is
    free to self-host.
  transports:
    - protocol: gRPC
      scheme: grpc
      baseURL: <your-org>.app.union.ai (FlyteIDL AdminService)
      documented: true
      note: Primary transport. The control plane is a stateless gRPC service; SDKs and CLI use gRPC.
    - protocol: REST
      scheme: https
      baseURL: https://<your-org>.app.union.ai/api/v1
      documented: true
      note: HTTP/JSON gateway auto-generated by grpc-gateway; one HTTP endpoint per gRPC method under /api/v1/.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented for the control plane, console, or any product surface as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming endpoint is documented in the FlyteAdmin API.
  authentication:
    - scheme: OAuth2 Authorization Code + PKCE
      note: Default interactive flow for CLI/UI clients (union/pyflyte/flytectl).
    - scheme: OAuth2 Client Credentials
      note: Machine-to-machine flow for headless clients.
    - scheme: OpenID Connect
      note: User authentication to the Union/Flyte console.
    - scheme: Bearer Token
      note: Access tokens presented as Authorization Bearer on gateway requests.
  endpointsConfirmedRest:
    - POST   /api/v1/projects
    - GET    /api/v1/projects
    - GET    /api/v1/projects/{id}
    - PUT    /api/v1/projects/{id}
    - GET    /api/v1/domains
    - POST   /api/v1/tasks
    - GET    /api/v1/task_ids/{project}/{domain}
    - GET    /api/v1/tasks/{project}/{domain}/{name}
    - GET    /api/v1/tasks/{project}/{domain}/{name}/{version}
    - POST   /api/v1/workflows
    - GET    /api/v1/workflow_ids/{project}/{domain}
    - GET    /api/v1/workflows/{project}/{domain}/{name}
    - GET    /api/v1/workflows/{project}/{domain}/{name}/{version}
    - POST   /api/v1/launch_plans
    - GET    /api/v1/launch_plan_ids/{project}/{domain}
    - GET    /api/v1/launch_plans/{project}/{domain}/{name}
    - GET    /api/v1/launch_plans/{project}/{domain}/{name}/{version}
    - PUT    /api/v1/launch_plans/{project}/{domain}/{name}/{version}
    - GET    /api/v1/active_launch_plans/{project}/{domain}
    - POST   /api/v1/executions
    - POST   /api/v1/executions/relaunch
    - POST   /api/v1/executions/recover
    - GET    /api/v1/executions/{project}/{domain}
    - GET    /api/v1/executions/{project}/{domain}/{name}
    - PUT    /api/v1/executions/{project}/{domain}/{name}
    - DELETE /api/v1/executions/{project}/{domain}/{name}
    - GET    /api/v1/data/executions/{project}/{domain}/{name}
    - GET    /api/v1/node_executions/{project}/{domain}/{name}
    - GET    /api/v1/version
sources:
  - url: https://www.union.ai/docs/flyte/architecture/component-architecture/
    type: Documentation
    note: Describes FlyteAdmin as the stateless gRPC control plane with a REST gateway.
  - url: https://www.union.ai/docs/flyte/api-reference/
    type: APIReference
    note: API reference covering FlyteAdmin, Flytekit SDK, pyflyte/flytectl CLI.
  - url: https://github.com/flyteorg/flyte
    type: GitHub
    note: FlyteIDL admin.proto google.api.http annotations are the authoritative source for the /api/v1 gateway paths.
  - url: https://www.union.ai/pricing
    type: Pricing
    note: Usage-based actions + per-second CPU/Memory/GPU; Team and custom Enterprise plans.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE streaming surface exists, so no AsyncAPI document was
    authored. An OpenAPI 3.0.1 document was created modeling the documented
    FlyteAdmin HTTP/JSON gateway endpoints conservatively, with gRPC noted as
    the primary transport and the REST gateway explicitly described as
    grpc-gateway-generated. The gRPC + HTTP transport split and OAuth2/OIDC
    bearer authentication are documented throughout the catalog so the REST
    gateway is never misrepresented as the primary or only interface.
