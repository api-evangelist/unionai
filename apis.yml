aid: unionai
url: https://raw.githubusercontent.com/api-evangelist/unionai/refs/heads/main/apis.yml
name: Union.ai
kind: company
description: Union.ai is the commercial AI/ML orchestration platform built on the
  open-source Flyte project. It exposes the Flyte/Union control plane (the FlyteAdmin
  service) for registering and running strongly-typed workflows, tasks, and launch
  plans, plus Union Serverless, Actors, and Artifacts. The control plane is primarily
  a gRPC API (FlyteIDL AdminService) with an auto-generated HTTP/JSON gateway exposed
  under /api/v1/, driven by the union / pyflyte CLI and Flytekit / Union SDKs.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- ML
- Orchestration
- Workflows
- MLOps
- Flyte
- Serverless
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
