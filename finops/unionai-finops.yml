meters:
- name: actions
  description: Task actions executed by workflows, billed per action.
  unit: actions
  aggregation: sum
  dimensions:
  - tenant
  - project
  - domain
  - workflow
- name: vcpu_hours
  description: Allocated vCPU time across action containers, metered per second.
  unit: vcpu_hours
  aggregation: sum
  dimensions:
  - tenant
  - project
  - domain
  - task
- name: memory_gb_hours
  description: Allocated memory across action containers, metered per second.
  unit: gb_hours
  aggregation: sum
  dimensions:
  - tenant
  - project
  - domain
  - task
- name: gpu_hours
  description: Allocated GPU accelerator time (T4g through B200), metered per second.
  unit: gpu_hours
  aggregation: sum
  dimensions:
  - tenant
  - project
  - domain
  - task
  - gpu_type
- name: platform_fee
  description: Fixed monthly Team-plan platform fee (includes an applied usage credit).
  unit: subscription
  aggregation: sum
  dimensions:
  - tenant
principles:
- name: Visibility
  description: Pull Union usage reporting per project/domain/workflow; in BYOC also reconcile raw cloud-compute cost on your own cloud bill.
- name: Allocation
  description: Tag projects and domains to cost centers; allocate action and resource-hour spend per workflow/team.
- name: Optimization
  description: Right-size task requests (CPU/Memory/GPU), pick the smallest sufficient GPU, use Actors to amortize warm containers, and avoid over-allocating resources that bill per second.
- name: Accountability
  description: Assign owners per project; review action counts and GPU-hour burn monthly against budget; negotiate Enterprise volume discounts at scale.
