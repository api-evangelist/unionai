description: >-
  FinOps view of Union.ai spend. Union bills usage-based pricing for the managed
  orchestration plus the action-allocated compute (CPU, Memory, GPU) each
  workflow consumes, metered per second and never for idle capacity. The headline
  meters are actions and per-second vCPU-hours, GB-hours, and GPU-hours. The
  open-source Flyte engine itself is free (Apache-2.0); only the managed Union
  platform and the underlying cloud compute incur charges. Enterprise / BYOC
  terms are negotiated and largely unpublished, so this artifact is not
  reconciled.
notes: >-
  Per-second resource rates and action pricing change; verify against the
  Union.ai pricing page during reconciliation. In BYOC deployments the raw
  cloud-compute cost lands on the customer's own cloud bill, separate from the
  Union platform fee - allocate both when modeling total cost.
